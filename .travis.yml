language: minimal

deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN
  local_dir: .
  on:
    branch: main
    
before_script:
  - sudo apt-get update
  - sudo apt-get install -y tidy

script:
  - tidy -eq index.html 2>&1 | grep -v "Warning: missing <!DOCTYPE html>" || true
  - grep -q "Enchiladas" index.html
  - grep -q "Tacos" index.html
  - grep -q "Burritos" index.html
  - grep -q "Bebidas" index.html

branches:
  only:
    - main
